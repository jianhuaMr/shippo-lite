name: Bug report
description: Report a problem with shippo-lite
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, plus what you expected instead.
      placeholder: buyLabel() threw a ShippoError with status 422 when…
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Ideally a small code snippet against the mocked client.
      render: ts
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: shippo-lite version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: Node 20.11 / Bun 1.1 / Cloudflare Workers / Vercel Edge
    validations:
      required: true
